<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Phả Hệ Dòng Họ Ngô</title>
    <style>
        /* === CẤU HÌNH GIAO DIỆN CHÍNH === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2ede4;
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        /* Thanh điều khiển điều hướng & Tìm kiếm */
        .control-panel {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            gap: 10px;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .control-panel input, .control-panel button {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .control-panel input {
            width: 250px;
        }

        .control-panel button {
            background-color: #7a0000;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .control-panel button:hover {
            background-color: #b30000;
        }

        .btn-reset {
            background-color: #555 !important;
        }
        .btn-reset:hover {
            background-color: #333 !important;
        }

        /* Khu vực hiển thị cây phả hệ */
        .tree-container {
            margin-top: 120px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-width: max-content;
            padding: 20px;
        }

        /* === HỆ THỐNG CSS FLEX-TREE (Khắc phục triệt để lỗi chồng lấp hình tròn) === */
        .tree ul {
            padding-top: 30px; 
            position: relative;
            transition: all 0.5s;
            display: flex;
            justify-content: center;
            padding-left: 0;
            margin: 0;
        }

        .tree li {
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 30px 15px 0 15px;
            transition: all 0.5s;
        }

        /* Tạo đường kẻ kết nối bằng các nhánh */
        .tree li::before, .tree li::after {
            content: '';
            position: absolute; 
            top: 0; 
            right: 50%;
            border-top: 2px solid #b5b5b5;
            width: 50%; 
            height: 30px;
        }
        .tree li::after {
            right: auto; 
            left: 50%;
            border-left: 2px solid #b5b5b5;
        }

        /* Loại bỏ các đường kẻ thừa tự động */
        .tree li:only-child::after, .tree li:only-child::before {
            display: none;
        }
        .tree li:only-child { 
            padding-top: 0;
        }
        .tree li:first-child::before, .tree li:last-child::after {
            border: 0 none;
        }
        .tree li:last-child::before {
            border-right: 2px solid #b5b5b5;
            border-radius: 0 5px 0 0;
        }
        .tree li:first-child::after {
            border-radius: 5px 0 0 0;
        }

        /* Đường thẳng đứng nối từ cha xuống nhánh con */
        .tree ul ul::before {
            content: '';
            position: absolute; 
            top: 0; 
            left: 50%;
            border-left: 2px solid #b5b5b5;
            width: 0; 
            height: 30px;
        }

        /* === THIẾT KẾ NODE HÌNH TRÒN CHUẨN === */
        .node-card {
            width: 150px;
            height: 150px;
            background-color: #7a0000; /* Màu đỏ đô */
            border: 4px solid #ffcc00; /* Viền vàng */
            border-radius: 50%;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            box-sizing: border-box;
            padding: 10px;
        }

        /* Nội dung hiển thị bên trong hình tròn */
        .node-generation {
            color: #00a2ff; /* Màu xanh đời */
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .node-name {
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            word-wrap: break-word;
            max-width: 120px;
        }

        /* Nút thêm con dấu cộng (+) */
        .add-btn {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 26px;
            background-color: #ff8800;
            border: 2px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            line-height: 22px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .add-btn:hover {
            background-color: #ffaa00;
            transform: translateX(-50%) scale(1.1);
        }

        /* Hiệu ứng khi tìm kiếm trúng đích */
        .node-card.highlight {
            border-color: #00ff2b !important;
            box-shadow: 0 0 30px #00ff2b;
            transform: scale(1.15);
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <input type="text" id="searchInput" placeholder="Nhập tên thành viên cần tìm...">
        <button onclick="searchMember()">Tìm kiếm</button>
        <button class="btn-reset" onclick="resetToDefault()" title="Xóa hết dữ liệu làm lại từ đầu nếu muốn">Đặt lại cây gốc</button>
    </div>

    <div class="tree-container">
        <div id="treeLayout" class="tree"></div>
    </div>

    <script>
        // 1. DỮ LIỆU GỐC CỐ ĐỊNH (Dùng khi chạy lần đầu tiên)
        const defaultData = {
            id: "root_ngo_tai_nhan",
            name: "Ngô Tài Nhân",
            generation: 1,
            title: "Sản Tài Nhằn",
            children: [
                {
                    id: "member_ngo_van_ly",
                    name: "Ngô Văn Lỵ",
                    generation: 2,
                    title: "",
                    children: []
                }
            ]
        };

        // Biến lưu trữ động hoạt động trong hệ thống
        let familyData = {};

        // 2. HÀM QUẢN LÝ BỘ NHỚ TRÌNH DUYỆT (CHỐNG MẤT DỮ LIỆU)
        function loadData() {
            const savedData = localStorage.getItem('NGO_FAMILY_TREE_DATA');
            if (savedData) {
                familyData = JSON.parse(savedData);
            } else {
                familyData = JSON.parse(JSON.stringify(defaultData));
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('NGO_FAMILY_TREE_DATA', JSON.stringify(familyData));
        }

        function resetToDefault() {
            if (confirm("Bạn có chắc chắn muốn xóa hết các nhánh con đã thêm để quay về cây gốc (Cụ Ngô Tài Nhân & Ngô Văn Lỵ)?")) {
                localStorage.removeItem('NGO_FAMILY_TREE_DATA');
                loadData();
                initTree();
            }
        }

        // 3. HÀM DỰNG GIAO DIỆN TỰ ĐỘNG (Render thuần Flexbox, loại bỏ hoàn toàn việc đè ô)
        function renderTree(node) {
            let html = `<li>`;
            
            // Vẽ nút tròn cho cá nhân
            html += `
                <div class="node-card" id="card-${node.id}">
                    <div class="node-generation">Đời ${node.generation} ${node.title ? '(' + node.title + ')' : ''}</div>
                    <div class="node-name">${node.name}</div>
                    <button class="add-btn" onclick="promptAddChild('${node.id}')" title="Thêm con cho ${node.name}">+</button>
                </div>
            `;
            
            // Nếu có nhánh con, đệ quy tạo danh sách con lồng nhau
            if (node.children && node.children.length > 0) {
                html += `<ul>`;
                node.children.forEach(child => {
                    html += renderTree(child);
                });
                html += `</ul>`;
            }
            
            html += `</li>`;
            return html;
        }

        // Đẩy cây lên giao diện màn hình
        function initTree() {
            const container = document.getElementById('treeLayout');
            container.innerHTML = `<ul>${renderTree(familyData)}</ul>`;
        }

        // 4. KHẮC PHỤC LỖI THÊM CON (Hàm tìm kiếm ID đệ quy sâu)
        function findAndAddChild(currentNode, parentId, newChildName) {
            if (currentNode.id === parentId) {
                if (!currentNode.children) currentNode.children = [];
                
                // Tạo cấu trúc dữ liệu con mới
                let newChild = {
                    id: "member_" + Date.now() + "_" + Math.floor(Math.random() * 1000), // Đảm bảo ID độc nhất 100%
                    name: newChildName,
                    generation: parseInt(currentNode.generation) + 1,
                    title: "",
                    children: []
                };
                
                currentNode.children.push(newChild);
                return true;
            }

            if (currentNode.children) {
                for (let i = 0; i < currentNode.children.length; i++) {
                    let found = findAndAddChild(currentNode.children[i], parentId, newChildName);
                    if (found) return true;
                }
            }
            return false;
        }

        // Xử lý sự kiện khi ấn nút dấu cộng (+) dưới mỗi ô
        function promptAddChild(parentId) {
            let childName = prompt("Nhập tên người con cần thêm:");
            if (childName && childName.trim() !== "") {
                let success = findAndAddChild(familyData, parentId, childName.trim());
                if (success) {
                    saveData(); // Ghi ngay lập tức vào bộ nhớ máy tính
                    initTree(); // Vẽ lại giao diện mới tức thì
                } else {
                    alert("Không tìm thấy mục dữ liệu của người cha!");
                }
            }
        }

        // 5. KHẮC PHỤC LỖI THANH TÌM KIẾM CỦA PHẢ HỆ
        function searchMember() {
            // Loại bỏ các viền sáng (highlight) cũ
            document.querySelectorAll('.node-card').forEach(card => {
                card.classList.remove('highlight');
            });

            let keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (keyword === "") return;

            let allNodes = document.querySelectorAll('.node-card');
            let foundCard = null;

            // Quét qua toàn bộ DOM cây để đối chiếu chuỗi ký tự tên tộc
            allNodes.forEach(card => {
                let nameText = card.querySelector('.node-name').textContent.toLowerCase();
                if (nameText.includes(keyword)) {
                    card.classList.add('highlight');
                    if (!foundCard) foundCard = card; // Giữ lại phần tử đầu tiên tìm thấy để cuộn màn hình
                }
            });

            // Nếu khớp tên, tự động trượt khung hình (Scroll) đưa người đó vào chính giữa màn hình
            if (foundCard) {
                foundCard.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            } else {
                alert("Không tìm thấy thành viên mang tên này trong hệ thống phả hệ!");
            }
        }

        // Bật tính năng nhấn nút Enter để tìm kiếm nhanh
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchMember();
            }
        });

        // HỆ THỐNG KHỞI CHẠY LẦN ĐẦU
        loadData();
        initTree();
    </script>
</body>
</html>
