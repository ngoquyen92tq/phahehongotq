    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: "Segoe UI", Arial, sans-serif; background: #fdf5e6; 
        }
        
        .main-container { display: flex; width: 100%; height: calc(100% - 75px); position: relative; }

        /* KHUNG NHẬP LIỆU BÊN TRÁI */
        .sidebar-form {
            width: 340px; background: #fffdf9; border-right: 4px double #781c1c;
            padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.15); z-index: 10;
            overflow-y: auto; box-sizing: border-box; transition: all 0.3s ease;
        }
        .sidebar-form h2 { font-size: 18px; color: #781c1c; border-bottom: 2px dashed #8c6d31; padding-bottom: 8px; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #5c4033; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 9px; border: 1px solid #8c6d31; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        
        .gender-group { display: flex; gap: 15px; margin-top: 5px; }
        .gender-group label { display: flex; align-items: center; gap: 5px; font-size: 14px; cursor: pointer; font-weight: normal; }
        .gender-group input { width: auto; cursor: pointer; }

        .btn-submit {
            width: 100%; background-color: #781c1c; color: #f7d070; padding: 11px;
            border: 1px solid #f7d070; border-radius: 6px; font-weight: bold; cursor: pointer;
            margin-bottom: 8px; text-transform: uppercase; font-size: 12px;
        }
        .btn-submit:hover { background-color: #9c2424; color: #fff; }

        /* NỀN CÂY PHẢ HỆ */
        #tree { 
            flex-grow: 1; height: 100%; position: relative; background-color: #f2e1c1;
            background-image: url('https://www.transparenttextures.com/patterns/gold-canvas.png');
        }

        /* TIÊU ĐỀ HOÀNH PHI */
        .header-clan { 
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(to right, #f5df98, #fff1b8, #f5df98); 
            padding: 10px 30px; border-bottom: 4px double #781c1c; height: 75px; box-sizing: border-box; z-index: 12;
        }
        .header-title-left, .header-title-right { font-size: 22px; font-weight: bold; color: #781c1c; letter-spacing: 2px; }
        .emblem-center { background-color: #de5d5d; width: 55px; height: 55px; border-radius: 50%; border: 3px solid #fff1b8; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(0,0,0,0.3); }
        .emblem-center span { font-family: "serif"; color: #fce79d; font-size: 32px; font-weight: bold; }

        .clan-footer-credit { position: absolute; bottom: 8px; right: 15px; background: rgba(255, 253, 249, 0.9); padding: 5px 12px; border-radius: 20px; border: 1px solid #8c6d31; font-size: 11px; color: #5c4033; font-weight: bold; z-index: 999; }
        
        /* KHU VỰC THÔNG TIN QR CODE (MẶC ĐỊNH ẨN TRÊN MÀN HÌNH) */
        .print-qr-footer {
            display: none;
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            text-align: center; background: #fff; padding: 10px 20px;
            border: 2px dashed #781c1c; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            align-items: center; justify-content: center; gap: 15px; z-index: 9999;
        }
        .print-qr-footer img { width: 75px; height: 75px; }
        .print-qr-footer p { margin: 0; font-size: 13px; font-weight: bold; color: #781c1c; line-height: 1.4; }

        .mobile-toggle-btn { display: none; }

        /* ĐỊNH DẠNG CHỮ CHUNG */
        .boc-node text[data-field="name"] { font-weight: bold !important; fill: #ffffff !important; }
        .boc-node text[data-field="title"] { fill: #fce79d !important; opacity: 0.9; }

        /* CẤU HÌNH KÍCH THƯỚC CHỮ CHO TỪNG ĐỜI */
        .doi-1 text[data-field="name"] { font-size: 22px !important; }
        .doi-1 text[data-field="title"] { font-size: 15px !important; }
        .doi-2 text[data-field="name"], .doi-3 text[data-field="name"] { font-size: 18px !important; }
        .doi-4 text[data-field="name"], .doi-5 text[data-field="name"] { font-size: 15px !important; }
        .doi-6 text[data-field="name"], .doi-7 text[data-field="name"] { font-size: 13px !important; }

        /* CẤU HÌNH MÀU SẮC PHÂN BIỆT ĐỜI */
        .doi-1 rect { fill: #781c1c !important; stroke: #f7d070 !important; stroke-width: 4px !important; }
        .doi-2 rect { fill: #d35400 !important; stroke: #781c1c !important; stroke-width: 2.5px !important; }
        .doi-3 rect { fill: #27ae60 !important; stroke: #ffffff !important; stroke-width: 2px !important; }
        .doi-4 rect { fill: #2980b9 !important; stroke: #ffffff !important; stroke-width: 1.5px !important; }
        .doi-5 rect { fill: #8e44ad !important; stroke: #ffffff !important; stroke-width: 1.5px !important; }
        .doi-6 rect { fill: #7e5233 !important; stroke: #ffffff !important; stroke-width: 1px !important; }
        .doi-7 rect { fill: #2c3e50 !important; stroke: #ffffff !important; stroke-width: 1px !important; }

        @media screen and (max-width: 768px) {
            .sidebar-form { position: absolute; bottom: 0; left: 0; width: 100%; height: 75%; transform: translateY(100%); border-radius: 20px 20px 0 0; border-right: none; border-top: 4px double #781c1c; }
            .sidebar-form.open { transform: translateY(0); }
            .mobile-toggle-btn { display: block; position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: #781c1c; color: #f7d070; padding: 10px 20px; border-radius: 30px; z-index: 1000; font-weight: bold; cursor: pointer; border: 2px solid #fff1b8; }
        }

        /* LỆNH IN TỐI ƯU KHỔ GIẤY A4 */
        @media print {
            .sidebar-form, .header-clan, .mobile-toggle-btn, .clan-footer-credit, .boc-search, .boc-toolbar { display: none !important; }
            body, html, .main-container, #tree { width: 100% !important; height: 100% !important; background: #ffffff !important; position: absolute !important; top: 0; left: 0; margin: 0; padding: 0; overflow: hidden; }
            .print-qr-footer { display: flex !important; }
            @page { 
                size: A4 landscape; 
                margin: 2mm 2mm 25mm 2mm; 
            }
        }
    </style>

        // HÀM HIỂN THỊ CÂY VÀ THAY ĐỔI Ô CHỌN CHA
        function hienThiLaiCay() {
            chart.load(giaPha);
            
            var sel = document.getElementById("parentSelect");
            sel.innerHTML = '<option value="">-- Chọn Cha / Mẹ --</option>';
            
            // Sắp xếp danh sách theo tên Alphabe để dễ tìm kiếm
            [...giaPha].sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
                var opt = document.createElement("option");
                opt.value = p.id; 
                opt.text = p.name + " (" + (p.title || "") + ")"; 
                sel.appendChild(opt);
            });
        }

        // THÊM NGƯỜI MỚI TRỰC TIẾP LÊN ĐÁM MÂY FIREBASE
        function themNguoi() {
            var name = document.getElementById("newName").value.trim();
            var title = document.getElementById("newTitle").value.trim();
            var pid = document.getElementById("parentSelect").value;
            var gender = document.querySelector('input[name="newGender"]:checked').value;
            var img = document.getElementById("photoBase64").value || imgNgo;
            
            if(!name) return alert("Vui lòng nhập họ tên!");

            var tagDoi = "doi-7";
            if(title.includes("1")) tagDoi = "doi-1";
            else if(title.includes("2")) tagDoi = "doi-2";
            else if(title.includes("3")) tagDoi = "doi-3";
            else if(title.includes("4")) tagDoi = "doi-4";
            else if(title.includes("5")) tagDoi = "doi-5";
            else if(title.includes("6")) tagDoi = "doi-6";
            
            var uniqueId = Date.now().toString(); // Tạo ID ngẫu nhiên không trùng

            // Đẩy bản ghi mới lên Firebase
            db.child(uniqueId).set({
                id: uniqueId,
                pid: pid || null,
                name: name,
                title: title,
                img: img,
                gender: gender,
                tags: [tagDoi]
            });

            // Reset Form nhập liệu
            document.getElementById("newName").value = "";
            document.getElementById("newTitle").value = "";
            document.getElementById("photoBase64").value = "";
            
            if(window.innerWidth <= 768) toggleMobile();
            alert("Đã cập nhật thành công thành viên mới lên hệ thống đám mây!");
        }

        function xuLyAnh(f) {
            var reader = new FileReader();
            reader.onload = e => document.getElementById("photoBase64").value = e.target.result;
            reader.readAsDataURL(f.files[0]);
        }

        function toggleMobile() { document.getElementById("sidebarForm").classList.toggle("open"); }

        // ĐIỀU CHỈNH LAYOUT IN ẤN
        function chuanBiIn(loaiIn) {
            if (loaiIn === 'chi_nam') {
                var chiInNam = giaPha.filter(n => n.gender === "nam");
                chart.load(chiInNam);
            } else {
                chart.load(giaPha);
            }

            chart.getLayout().compact = true;
            chart.fit();

            setTimeout(() => { 
                window.print(); 
                chart.getLayout().compact = false;
                hienThiLaiCay(); 
            }, 800);
        }

        // Tự động khởi chạy mã QR
        taoMaQR();
